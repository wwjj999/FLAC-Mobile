name: spotiflac_android
description: Download Spotify tracks in FLAC using extension providers
publish_to: "none"
version: 4.7.0+136

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  flutter_riverpod: ^3.3.2

  # Navigation
  go_router: ^17.3.0

# Storage & Persistence
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.3.1
  path_provider: ^2.1.6
  path: ^1.9.0
  sqflite: ^2.4.3

# HTTP & Network
  http: ^1.6.0
  connectivity_plus: ^7.2.0

  # UI Components
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1

  # Material Expressive 3 / Dynamic Color
  dynamic_color: ^1.7.0

  # Permissions
  permission_handler: ^12.0.3

  # File Picker
  file_picker: 12.0.0-beta.5

  # JSON Serialization
  json_annotation: ^4.12.0

  # Utils
  url_launcher: ^6.3.1
  device_info_plus: ^13.2.0
  share_plus: ^13.2.0
  receive_sharing_intent: ^1.9.0
  logger: ^2.5.0

  # FFmpeg for audio conversion
  ffmpeg_kit_flutter_new_full: ^2.1.0
  open_filex: ^4.7.0

  # Notifications
  flutter_local_notifications: ^22.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4
  riverpod_lint: ^3.1.4
  json_serializable: ^6.14.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icon.png"
  image_path_android: "icon_android.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "icon_foreground_android.png"
  adaptive_icon_foreground_inset: 16
  adaptive_icon_monochrome: "icon_foreground_android.png"
  ios_content_mode: scaleAspectFill
  remove_alpha_ios: true
  background_color_ios: "#000000"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

  fonts:
    - family: Google Sans Flex
      fonts:
        - asset: assets/fonts/GoogleSansFlex.ttf
